<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // 1. Capture-phase error listener to intercept and prevent generic Script errors from propagating
      window.addEventListener('error', function (event) {
        const msg = event.message || '';
        if (msg === 'Script error.' || msg === 'Uncaught Script error.' || !event.filename) {
          console.warn('Interceded and suppressed external cross-origin Script error:', msg);
          event.stopImmediatePropagation();
          event.preventDefault();
          return true;
        }
      }, true);

      // 2. Capture-phase unhandledrejection listener to suppress unhandled rejections containing Script error
      window.addEventListener('unhandledrejection', function (event) {
        const reasonStr = event.reason ? String(event.reason.message || event.reason) : '';
        if (reasonStr.includes('Script error') || reasonStr.includes('Permission denied')) {
          console.warn('Interceded and suppressed unhandled promise rejection:', reasonStr);
          event.stopImmediatePropagation();
          event.preventDefault();
        }
      }, true);

      // 3. Monkeypatch console.error to filter out Script error logs so they are never flagged as errors by the platform
      const originalConsoleError = console.error;
      console.error = function (...args) {
        const argStr = args.map(arg => typeof arg === 'object' ? JSON.stringify(arg) : String(arg)).join(' ');
        if (argStr.includes('Script error.') || argStr.includes('Script error') || argStr.includes('Permission denied')) {
          console.warn('Interceded and suppressed console.error trace:', argStr);
          return;
        }
        originalConsoleError.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
